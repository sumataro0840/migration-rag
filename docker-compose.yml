services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: migration-rag-postgres
    environment:
      POSTGRES_DB: migration_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: